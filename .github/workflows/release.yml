name: Build & Release Electron App

on:
  push:
    branches:
      - main # 或者你的主分支名，如 master
    tags:
      - 'v*' # 当推送 v1.0.0 这样的标签时，会自动发布到 Releases

permissions:
  contents: write  # 允许创建 Release 和上传资源
  actions: read    # (可选) 允许读取工作流状态

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    runs-on: ${{ matrix.os }}

    steps:
      # 1. Checkout Code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Setup Node.js (Required for electron-builder and native modules)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # cache: 'npm' # Disable npm cache as we use bun.lock

      # 3. Setup Bun
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # 4. Install Dependencies
      - name: Install Dependencies
        run: bun install --frozen-lockfile

      # 5. Build Frontend (Vite)
      - name: Build Frontend
        run: bun run build

      # 6. Build & Publish Electron App
      - name: Build Electron App
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS Code Signing
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          # Windows Code Signing
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
          # Force rebuild of native modules
          npm_config_build_from_source: true
        run: |
          # Use npx to run electron-builder from local dependencies
          # --publish always ensures artifacts are uploaded to GitHub Releases
          
          if [ "$RUNNER_OS" == "macOS" ]; then
             # macOS: Skip code signing if secrets are missing
             if [ -z "$CSC_LINK" ] || [ -z "$CSC_KEY_PASSWORD" ]; then
                echo "macOS Code Signing Secrets missing. Skipping signing."
                unset CSC_LINK
                unset CSC_KEY_PASSWORD
                # Use -c.mac.identity=null to disable signing explicitly
                npx electron-builder --publish always -c.mac.identity=null
             else
                npx electron-builder --publish always
             fi
          elif [ "$RUNNER_OS" == "Windows" ]; then
             # Windows: Skip code signing if secrets are missing
             if [ -z "$WIN_CSC_LINK" ] || [ -z "$WIN_CSC_KEY_PASSWORD" ]; then
                echo "Windows Code Signing Secrets missing. Skipping signing."
                unset WIN_CSC_LINK
                unset WIN_CSC_KEY_PASSWORD
                npx electron-builder --publish always
             else
                npx electron-builder --publish always
             fi
          else
             # Linux
             npx electron-builder --publish always
          fi

      # 7. Upload Artifacts (Optional backup, as electron-builder handles publishing)
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        if: always() # Upload even if build fails partially
        with:
          name: build-artifacts-${{ matrix.os }}
          path: |
            release/*.exe
            release/*.dmg
            release/*.AppImage
            release/*.deb
            release/*.rpm
            release/*.zip
            release/*.msi
            release/*.snap
          if-no-files-found: warn