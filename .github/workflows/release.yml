name: Build & Release Electron App

on:
  push:
    branches:
      - main # 或者你的主分支名，如 master
    tags:
      - 'v*' # 当推送 v1.0.0 这样的标签时，会自动发布到 Releases

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    runs-on: ${{ matrix.os }}

    steps:
      # 1. 检出代码
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. 设置 Bun 环境 (替换掉 setup-node)
      # 使用 oven-sh/setup-bun，这是 Bun 官方的 Action
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest # 或者指定具体版本，如 '1.1.0'

      # 3. 安装依赖
      - name: Install Dependencies
        run: bun install --frozen-lockfile

      # 4. 构建前端资源 (Vite)
      - name: Build Frontend
        run: bun run build  # 这里改用 bun run

      # 5. 打包 Electron 应用
      - name: Build Electron App
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # 推荐：使用 bunx 运行 electron-builder (类似 npx)，或者直接运行命令
        # 如果你的 package.json 里定义了 dist 脚本，也可以直接用: run: bun run dist
        run: bunx electron-builder --publish always


      # 6. 上传构建产物
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        with:
          name: OJFlow-${{ matrix.os }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.AppImage
            dist/*.deb
            dist/*.rpm
            dist/*.zip
          if-no-files-found: error